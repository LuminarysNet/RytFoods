version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: rytfoods-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: rytfoods
    volumes:
      - mongodb_data:/data/db
    networks:
      - rytfoods-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rytfoods-backend
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://root:root@mongodb:27017/rytfoods
      JWT_SECRET: your_jwt_secret_key_here
      PORT: 3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - rytfoods-network

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: rytfoods-admin
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3000
    networks:
      - rytfoods-network

volumes:
  mongodb_data:

networks:
  rytfoods-network:
    driver: bridge
